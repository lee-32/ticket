<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tickets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .aspect-3-4 { aspect-ratio: 3 / 4; }
    </style>
</head>
<body class="bg-white text-gray-900">
    <div id="app"></div>

    <script>
        // --- 앱 상태 관리 ---
        let records = JSON.parse(localStorage.getItem('tickets_records_v2') || '[]');
        let currentView = 'list'; // 'list', 'gallery', 'add', 'detail'
        let selectedRecord = null;
        const categories = ['공연', '전시', '스포츠', '기타'];

        // --- 유틸리티 ---
        function saveToStorage() {
            localStorage.setItem('tickets_records_v2', JSON.stringify(records));
        }

        function setView(view, data = null) {
            currentView = view;
            selectedRecord = data;
            render();
            window.scrollTo(0, 0);
        }

        // --- 이미지 검색 시뮬레이션 ---
        function handleAutoSearch() {
            const title = document.getElementById('form-title').value;
            if (!title) return alert('제목을 먼저 입력해주세요.');
            if (confirm(`'${title}' 관련 포스터 예시 이미지를 적용할까요?`)) {
                document.getElementById('form-image').value = 'https://images.unsplash.com/photo-1503095396549-807a8bc36674?q=80&w=1000';
            }
        }

        // --- 렌더링 엔진 ---
        function render() {
            const app = document.getElementById('app');
            
            if (currentView === 'list') {
                app.innerHTML = `
                    <div class="max-w-4xl mx-auto p-4 pb-24">
                        <header class="flex justify-between items-center mb-8 py-4">
                            <h1 class="text-3xl font-black text-indigo-600 flex items-center gap-2">tickets</h1>
                            <button onclick="setView('gallery')" class="flex items-center gap-2 bg-gray-50 border border-gray-200 px-4 py-2 rounded-full text-sm font-medium">전체보기</button>
                        </header>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                            ${records.length === 0 ? '<div class="col-span-full py-20 text-center text-gray-400">첫 티켓을 등록해보세요!</div>' : 
                            records.map((r, i) => `
                                <div onclick="setView('detail', ${i})" class="cursor-pointer group">
                                    <div class="aspect-3-4 bg-gray-100 rounded-2xl overflow-hidden shadow-sm group-hover:shadow-md transition-all">
                                        ${r.image ? `<img src="${r.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-gray-300">No Image</div>`}
                                    </div>
                                    <div class="mt-3"><h3 class="font-bold truncate">${r.title}</h3><p class="text-xs text-gray-500">${r.date}</p></div>
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="setView('add')" class="fixed bottom-8 right-8 bg-indigo-600 text-white p-4 rounded-full shadow-xl">추가</button>
                    </div>`;
            } else if (currentView === 'add') {
                app.innerHTML = `
                    <div class="max-w-2xl mx-auto p-4 pb-24">
                        <header class="flex items-center gap-4 mb-6 py-4">
                            <button onclick="setView('list')">뒤로</button>
                            <h1 class="text-xl font-bold">새 기록</h1>
                        </header>
                        <div class="space-y-6">
                            <input id="form-title" type="text" placeholder="제목" class="w-full p-3 border border-gray-200 rounded-xl outline-none focus:border-indigo-500">
                            <div class="flex gap-2">
                                <input id="form-image" type="text" placeholder="이미지 주소" class="flex-1 p-3 border border-gray-200 rounded-xl outline-none">
                                <button onclick="handleAutoSearch()" class="bg-gray-100 p-3 rounded-xl">검색</button>
                            </div>
                            <select id="form-category" class="w-full p-3 border border-gray-200 rounded-xl">
                                ${categories.map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                            <div class="grid grid-cols-2 gap-2">
                                <input id="form-date" type="date" class="p-3 border border-gray-200 rounded-xl">
                                <input id="form-time" type="time" class="p-3 border border-gray-200 rounded-xl">
                            </div>
                            <textarea id="form-review" placeholder="감상평" class="w-full p-4 h-32 bg-gray-50 rounded-2xl outline-none resize-none"></textarea>
                            <button onclick="saveRecord()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold">저장하기</button>
                        </div>
                    </div>`;
            } else if (currentView === 'detail') {
                const r = records[selectedRecord];
                app.innerHTML = `
                    <div class="max-w-2xl mx-auto p-4 pb-24">
                        <header class="flex justify-between items-center mb-6 py-4">
                            <button onclick="setView('list')">뒤로</button>
                            <button onclick="deleteRecord(${selectedRecord})" class="text-red-500">삭제</button>
                        </header>
                        <div class="aspect-3-4 bg-gray-100 rounded-3xl overflow-hidden mb-8 shadow-xl">
                            ${r.image ? `<img src="${r.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-gray-300">이미지 없음</div>`}
                        </div>
                        <h1 class="text-3xl font-black mb-4">${r.title}</h1>
                        <div class="grid grid-cols-2 gap-4 py-4 border-y border-gray-100 my-6 text-sm text-gray-500">
                            <div>날짜: ${r.date}</div>
                            <div>분류: ${r.category}</div>
                        </div>
                        <p class="whitespace-pre-wrap">${r.review}</p>
                    </div>`;
            } else if (currentView === 'gallery') {
                app.innerHTML = `
                    <div class="max-w-5xl mx-auto p-4 pb-24">
                        <header class="flex items-center gap-4 mb-8 py-4">
                            <button onclick="setView('list')">뒤로</button>
                            <h1 class="text-2xl font-bold">기록 보관함</h1>
                        </header>
                        <div class="grid grid-cols-3 sm:grid-cols-5 gap-2">
                            ${records.map((r, i) => `
                                <div onclick="setView('detail', ${i})" class="aspect-3-4 rounded-lg overflow-hidden cursor-pointer">
                                    ${r.image ? `<img src="${r.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full bg-gray-100 flex items-center justify-center text-[10px] text-gray-400">${r.title}</div>`}
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }
            lucide.createIcons();
        }

        function saveRecord() {
            const newRecord = {
                title: document.getElementById('form-title').value,
                image: document.getElementById('form-image').value,
                category: document.getElementById('form-category').value,
                date: document.getElementById('form-date').value,
                time: document.getElementById('form-time').value,
                review: document.getElementById('form-review').value,
            };
            if (!newRecord.title || !newRecord.date) return alert('제목과 날짜는 필수입니다.');
            records.unshift(newRecord);
            saveToStorage();
            setView('list');
        }

        function deleteRecord(index) {
            if (confirm('정말 삭제할까요?')) {
                records.splice(index, 1);
                saveToStorage();
                setView('list');
            }
        }

        render();
    </script>
</body>
</html>
