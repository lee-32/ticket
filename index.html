<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tickets</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        .aspect-3-4 { aspect-ratio: 3 / 4; }
        button, select, input, textarea { font-size: 16px !important; } 
    </style>
</head>
<body class="bg-white text-gray-900">
    <div id="app"></div>

    <script>
        // --- 상태 관리 ---
        let records = JSON.parse(localStorage.getItem('tickets_records_v4') || '[]');
        let currentView = 'list'; 
        let selectedRecordIndex = null;
        const categories = ['공연', '전시', '스포츠', '기타'];

        // 필터 상태
        let filterYear = '전체';
        let filterCategory = '전체';

        // 폼 임시 데이터
        let formData = {
            category: '공연',
            title: '',
            image: '',
            date: '',
            time: '',
            location: '',
            companions: '',
            rating: 0,
            review: ''
        };

        // --- 유틸리티 ---
        function saveToStorage() {
            localStorage.setItem('tickets_records_v4', JSON.stringify(records));
        }

        function setView(view, index = null) {
            currentView = view;
            selectedRecordIndex = index;
            render();
            window.scrollTo(0, 0);
        }

        function handleImageUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    formData.image = e.target.result;
                    render();
                };
                reader.readAsDataURL(file);
            }
        }

        function openMap(location) {
            if (!location) return;
            const url = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}`;
            window.open(url, '_blank');
        }

        // --- 렌더링 ---
        function renderStars(rating, interactive = false) {
            let starsHtml = '<div class="flex gap-1">';
            for (let i = 1; i <= 5; i++) {
                const isFilled = i <= rating;
                starsHtml += `
                    <i data-lucide="star" 
                       onclick="${interactive ? `setRating(${i})` : ''}"
                       class="w-6 h-6 ${isFilled ? 'fill-indigo-500 text-indigo-500' : 'text-gray-200'} ${interactive ? 'cursor-pointer hover:scale-110 transition-transform' : ''}">
                    </i>`;
            }
            starsHtml += '</div>';
            return starsHtml;
        }

        function setRating(val) {
            formData.rating = val;
            render();
        }

        function render() {
            const app = document.getElementById('app');
            
            if (currentView === 'list') {
                app.innerHTML = `
                    <div class="max-w-4xl mx-auto p-4 pb-24">
                        <header class="flex justify-between items-center mb-8 py-4">
                            <h1 class="text-3xl font-black text-indigo-600 flex items-center gap-2">
                                <i data-lucide="ticket" class="w-8 h-8"></i> tickets
                            </h1>
                            <button onclick="setView('gallery')" class="flex items-center gap-2 bg-gray-50 border border-gray-200 px-4 py-2 rounded-full text-sm font-medium hover:bg-gray-100 transition-colors">
                                <i data-lucide="grid" class="w-4 h-4"></i> 전체보기
                            </button>
                        </header>
                        <div class="grid grid-cols-2 md:grid-cols-3 gap-6">
                            ${records.length === 0 ? `
                                <div class="col-span-full py-20 text-center text-gray-400 border-2 border-dashed border-gray-100 rounded-3xl">
                                    <p>아직 기록이 없습니다.</p>
                                    <p class="text-sm mt-1">하단 [+] 버튼을 눌러 첫 티켓을 등록하세요!</p>
                                </div>` : 
                            records.map((r, i) => `
                                <div onclick="setView('detail', ${i})" class="cursor-pointer group">
                                    <div class="aspect-3-4 bg-gray-100 rounded-2xl overflow-hidden shadow-sm group-hover:shadow-md transition-all relative">
                                        ${r.image ? `<img src="${r.image}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300">` : `<div class="w-full h-full flex items-center justify-center text-gray-300"><i data-lucide="image" class="w-10 h-10"></i></div>`}
                                        <div class="absolute top-2 right-2 bg-black/60 text-white text-[10px] px-2 py-1 rounded-md backdrop-blur-sm">
                                            ${r.category}
                                        </div>
                                    </div>
                                    <div class="mt-3 px-1">
                                        <h3 class="font-bold truncate text-gray-900">${r.title}</h3>
                                        <p class="text-xs text-gray-500 mt-1">${r.date}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <button onclick="resetFormData(); setView('add')" class="fixed bottom-8 right-8 bg-indigo-600 text-white p-4 rounded-full shadow-xl hover:bg-indigo-700 hover:-translate-y-1 transition-all">
                            <i data-lucide="plus" class="w-6 h-6"></i>
                        </button>
                    </div>`;
            } else if (currentView === 'add') {
                app.innerHTML = `
                    <div class="max-w-2xl mx-auto p-4 pb-24">
                        <header class="flex items-center gap-4 mb-6 py-4">
                            <button onclick="setView('list')" class="p-2 hover:bg-gray-100 rounded-full transition-colors"><i data-lucide="chevron-left"></i></button>
                            <h1 class="text-xl font-bold">새 기록 작성</h1>
                        </header>
                        <div class="space-y-6">
                            <div class="flex flex-col sm:flex-row gap-6">
                                <!-- 이미지 업로드 영역 (주소 입력창 삭제됨) -->
                                <div class="w-full sm:w-48 aspect-3-4 bg-gray-50 rounded-2xl overflow-hidden relative border-2 border-dashed border-gray-200 flex flex-col items-center justify-center group hover:border-indigo-400 hover:bg-indigo-50 transition-colors">
                                    ${formData.image ? `<img src="${formData.image}" class="w-full h-full object-cover">` : `
                                        <i data-lucide="camera" class="text-gray-300 mb-2 group-hover:text-indigo-400 transition-colors"></i>
                                        <span class="text-xs text-gray-400 group-hover:text-indigo-500 font-medium">포스터 등록</span>
                                    `}
                                    <input type="file" accept="image/*" onchange="handleImageUpload(event)" class="absolute inset-0 opacity-0 cursor-pointer">
                                </div>
                                
                                <div class="flex-1 space-y-4">
                                    <div>
                                        <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">제목 *</label>
                                        <input type="text" placeholder="관람한 제목을 적어주세요" value="${formData.title}" oninput="formData.title=this.value" class="w-full p-3 bg-white border border-gray-200 rounded-xl outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">카테고리</label>
                                        <select onchange="formData.category=this.value" class="w-full p-3 bg-white border border-gray-200 rounded-xl outline-none appearance-none focus:border-indigo-500">
                                            ${categories.map(c => `<option value="${c}" ${formData.category === c ? 'selected' : ''}>${c}</option>`).join('')}
                                        </select>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <div>
                                            <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">날짜 *</label>
                                            <input type="date" value="${formData.date}" oninput="formData.date=this.value" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-sm focus:border-indigo-500 outline-none">
                                        </div>
                                        <div>
                                            <label class="block text-xs font-bold text-gray-500 mb-1 ml-1">시간</label>
                                            <input type="time" value="${formData.time}" oninput="formData.time=this.value" class="w-full p-3 bg-white border border-gray-200 rounded-xl text-sm focus:border-indigo-500 outline-none">
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="space-y-4 pt-4 border-t border-gray-100">
                                <div class="relative">
                                    <i data-lucide="map-pin" class="absolute left-3 top-3.5 w-5 h-5 text-gray-400"></i>
                                    <input type="text" placeholder="장소 (입력 시 상세화면에서 지도와 연동됩니다)" value="${formData.location}" oninput="formData.location=this.value" class="w-full pl-10 p-3 bg-white border border-gray-200 rounded-xl outline-none focus:border-indigo-500">
                                </div>
                                <div class="relative">
                                    <i data-lucide="users" class="absolute left-3 top-3.5 w-5 h-5 text-gray-400"></i>
                                    <input type="text" placeholder="누구와 함께 했나요?" value="${formData.companions}" oninput="formData.companions=this.value" class="w-full pl-10 p-3 bg-white border border-gray-200 rounded-xl outline-none focus:border-indigo-500">
                                </div>
                                
                                <div class="py-2 px-1">
                                    <p class="text-sm font-bold text-gray-600 mb-2">나의 별점</p>
                                    ${renderStars(formData.rating, true)}
                                </div>
                                
                                <textarea placeholder="그날의 기억과 감상을 자유롭게 남겨주세요." oninput="formData.review=this.value" class="w-full p-4 h-32 bg-gray-50 border border-gray-100 rounded-2xl outline-none resize-none focus:bg-white focus:border-indigo-300 focus:ring-2 focus:ring-indigo-50 transition-all">${formData.review}</textarea>
                            </div>
                            <button onclick="saveRecord()" class="w-full bg-indigo-600 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-[0.98] transition-transform">기록 저장하기</button>
                        </div>
                    </div>`;
            } else if (currentView === 'detail') {
                const r = records[selectedRecordIndex];
                app.innerHTML = `
                    <div class="max-w-2xl mx-auto p-4 pb-24">
                        <header class="flex justify-between items-center mb-6 py-4">
                            <button onclick="setView('list')" class="p-2 hover:bg-gray-100 rounded-full transition-colors flex items-center gap-1 text-gray-600 font-medium">
                                <i data-lucide="chevron-left" class="w-5 h-5"></i> 목록
                            </button>
                            <button onclick="deleteRecord(${selectedRecordIndex})" class="text-red-400 p-2 hover:bg-red-50 rounded-full transition-colors"><i data-lucide="trash-2"></i></button>
                        </header>
                        
                        <div class="aspect-3-4 bg-gray-100 rounded-3xl overflow-hidden mb-8 shadow-xl">
                            ${r.image ? `<img src="${r.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full flex items-center justify-center text-gray-300"><i data-lucide="image" class="w-16 h-16"></i></div>`}
                        </div>
                        
                        <div class="px-2">
                            <div class="flex justify-between items-start mb-3">
                                <span class="px-3 py-1 bg-indigo-50 text-indigo-600 text-xs font-bold rounded-full">${r.category}</span>
                                ${renderStars(r.rating)}
                            </div>
                            <h1 class="text-3xl font-black text-gray-900 mb-6 leading-tight">${r.title}</h1>
                            
                            <div class="grid grid-cols-2 gap-y-5 py-6 border-y border-gray-100 my-6 text-sm text-gray-600">
                                <div class="flex items-center gap-2"><i data-lucide="calendar" class="w-4 h-4 text-gray-400"></i> ${r.date}</div>
                                <div class="flex items-center gap-2"><i data-lucide="clock" class="w-4 h-4 text-gray-400"></i> ${r.time || '시간 정보 없음'}</div>
                                
                                <!-- 지도 연동 UI -->
                                <div class="flex items-center justify-between col-span-2 group">
                                    <div class="flex items-center gap-2 font-medium text-gray-800"><i data-lucide="map-pin" class="w-4 h-4 text-gray-400"></i> ${r.location || '장소 정보 없음'}</div>
                                    ${r.location ? `<button onclick="openMap('${r.location}')" class="text-indigo-600 font-bold flex items-center gap-1 bg-indigo-50 px-3 py-1.5 rounded-full text-xs hover:bg-indigo-100 transition-colors shadow-sm">지도 보기 <i data-lucide="external-link" class="w-3 h-3"></i></button>` : ''}
                                </div>
                                
                                <div class="flex items-center gap-2 col-span-2"><i data-lucide="users" class="w-4 h-4 text-gray-400"></i> ${r.companions || '혼자 관람'}</div>
                            </div>
                            
                            <div class="mt-8">
                                <h4 class="text-xs font-bold text-gray-400 mb-3 uppercase tracking-widest flex items-center gap-2">
                                    <i data-lucide="pen-line" class="w-4 h-4"></i> My Review
                                </h4>
                                <div class="bg-gray-50 p-5 rounded-2xl">
                                    <p class="text-gray-800 leading-relaxed whitespace-pre-wrap">${r.review || '기록된 감상평이 없습니다.'}</p>
                                </div>
                            </div>
                        </div>
                    </div>`;
            } else if (currentView === 'gallery') {
                const years = ['전체', ...new Set(records.map(r => new Date(r.date).getFullYear().toString()).filter(y => y !== 'NaN'))].sort((a,b) => b-a);
                const filtered = records.filter(r => {
                    const yMatch = filterYear === '전체' || new Date(r.date).getFullYear().toString() === filterYear;
                    const cMatch = filterCategory === '전체' || r.category === filterCategory;
                    return yMatch && cMatch;
                });

                app.innerHTML = `
                    <div class="max-w-5xl mx-auto p-4 pb-24">
                        <header class="flex items-center gap-4 mb-8 py-4">
                            <button onclick="setView('list')" class="p-2 hover:bg-gray-100 rounded-full transition-colors"><i data-lucide="chevron-left"></i></button>
                            <h1 class="text-2xl font-bold">기록 보관함</h1>
                        </header>
                        
                        <div class="flex flex-wrap gap-3 mb-8 bg-gray-50 p-4 rounded-2xl border border-gray-100 shadow-inner">
                            <div class="flex items-center gap-2 bg-white px-3 py-2 rounded-lg shadow-sm border border-gray-100">
                                <i data-lucide="filter" class="w-4 h-4 text-gray-400"></i>
                                <select onchange="filterYear=this.value; render()" class="bg-transparent border-none text-sm outline-none font-medium cursor-pointer">
                                    ${years.map(y => `<option value="${y}" ${filterYear === y ? 'selected' : ''}>${y === '전체' ? '모든 연도' : y + '년'}</option>`).join('')}
                                </select>
                            </div>
                            <div class="flex items-center gap-2 bg-white px-3 py-2 rounded-lg shadow-sm border border-gray-100">
                                <i data-lucide="layout" class="w-4 h-4 text-gray-400"></i>
                                <select onchange="filterCategory=this.value; render()" class="bg-transparent border-none text-sm outline-none font-medium cursor-pointer">
                                    <option value="전체" ${filterCategory === '전체' ? 'selected' : ''}>모든 카테고리</option>
                                    ${categories.map(c => `<option value="${c}" ${filterCategory === c ? 'selected' : ''}>${c}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 sm:grid-cols-5 gap-3">
                            ${filtered.length === 0 ? `<div class="col-span-full py-20 text-center text-gray-400">해당 조건의 기록이 없습니다.</div>` : 
                            filtered.map((r, i) => {
                                const originalIndex = records.indexOf(r);
                                return `
                                <div onclick="setView('detail', ${originalIndex})" class="aspect-3-4 rounded-xl overflow-hidden cursor-pointer hover:opacity-80 active:scale-95 transition-all shadow-sm border border-gray-100 relative group">
                                    ${r.image ? `<img src="${r.image}" class="w-full h-full object-cover">` : `<div class="w-full h-full bg-gray-100 flex items-center justify-center text-xs text-gray-400 p-2 text-center break-words">${r.title}</div>`}
                                    <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                        <span class="text-white text-xs font-bold text-center px-2 line-clamp-2">${r.title}</span>
                                    </div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
            }
            // Lucide 아이콘 렌더링
            lucide.createIcons();
        }

        function resetFormData() {
            formData = { category: '공연', title: '', image: '', date: '', time: '', location: '', companions: '', rating: 0, review: '' };
        }

        function saveRecord() {
            if (!formData.title || !formData.date) return alert('제목과 날짜는 필수 입력 사항입니다.');
            records.unshift({...formData});
            saveToStorage();
            setView('list');
        }

        function deleteRecord(index) {
            if (confirm('정말 이 기록을 삭제하시겠습니까?')) {
                records.splice(index, 1);
                saveToStorage();
                setView('list');
            }
        }

        // 초기 앱 렌더링
        render();
    </script>
</body>
</html>
